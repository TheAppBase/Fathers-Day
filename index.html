document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

.getItem(\"fdc_times\");\n      if (raw) { const a = JSON.parse(raw); if (Array.isArray(a) && a.length === this.lines.length) return a; }\n    } catch (e) {}\n    return this.defaultTimes.slice();\n  }\n  saveTimes(a) { try { localStorage.setItem(\"fdc_times\", JSON.stringify(a)); } catch (e) {} }\n\n  getAudio() {\n    if (!this.audio) {\n      const a = new Audio();\n      a.preload = \"auto\";\n      this.audio = a;\n      a.addEventListener(\"error\", () => { console.warn(\"audio error\", a.error && a.error.code); });\n      a.addEventListener(\"loadedmetadata\", () => {\n        if (a.duration && isFinite(a.duration)) this.setState({ dur: a.duration * 1000 });\n      });\n      a.addEventListener(\"ended\", () => { this.stopTick(); this.setState({ playing: false }); });\n      // Server mislabels song.wav's content-type, so load the bytes and re-wrap\n      // them in a correctly-typed Blob the browser will actually decode.\n      fetch(\"song.wav\")\n        .then((r) => r.arrayBuffer())\n        .then((b) => {\n          a.src = URL.createObjectURL(new Blob([b], { type: \"audio/wav\" }));\n          if (this.pendingPlay) { this.pendingPlay = false; a.play().catch(() => {}); this.startTick(); }\n        })\n        .catch(() => { a.src = \"song.wav\"; });\n    }\n    return this.audio;\n  }\n\n  componentDidMount() {\n    this.times = this.loadTimes();\n    this.onResize = () => this.forceUpdate();\n    window.addEventListener(\"resize\", this.onResize);\n    this.getAudio();\n    this.forceUpdate();\n  }\n\n  componentWillUnmount() {\n    this.stopTick();\n    if (this.audio) this.audio.pause();\n    window.removeEventListener(\"resize\", this.onResize);\n  }\n\n  startTick() {\n    this.stopTick();\n    const loop = () => {\n      const a = this.audio;\n      if (a && !this.dragging) this.setState({ elapsed: a.currentTime * 1000 });\n      this.raf = requestAnimationFrame(loop);\n    };\n    this.raf = requestAnimationFrame(loop);\n  }\n  stopTick() {\n    if (this.raf) { cancelAnimationFrame(this.raf); this.raf = null; }\n  }\n\n  onMenu = () => this.setState(s => ({ menuOpen: !s.menuOpen }));\n  onExpand = () => this.setState(s => ({ expanded: !s.expanded }));\n  onCollapse = () => this.setState(s => ({ collapsed: !s.collapsed }));\n\n  seekFromEvent(e) {\n    const el = this.trackRef.current;\n    if (!el) return;\n    const rect = el.getBoundingClientRect();\n    let ratio = (e.clientX - rect.left) / rect.width;\n    ratio = Math.max(0, Math.min(1, ratio));\n    const ms = ratio * this.total;\n    if (this.audio) this.audio.currentTime = ms / 1000;\n    this.setState({ elapsed: ms });\n  }\n\n  onScrubDown = (e) => {\n    this.dragging = true;\n    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}\n    this.seekFromEvent(e);\n  };\n  onScrubMove = (e) => { if (this.dragging) this.seekFromEvent(e); };\n  onScrubUp = (e) => {\n    this.dragging = false;\n    try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (err) {}\n  };\n\n  onPlay = () => {\n    const a = this.getAudio();\n    if (!a) return;\n    if (this.state.playing) {\n      a.pause();\n      this.stopTick();\n      this.setState({ playing: false });\n    } else {\n      if (!a.src) { this.pendingPlay = true; this.setState({ playing: true }); return; }\n      if (a.currentTime >= (a.duration || 0) - 0.05) a.currentTime = 0;\n      a.play().catch(() => {});\n      this.startTick();\n      this.setState({ playing: true });\n    }\n  };\n\n  onStartSync = () => {\n    const a = this.getAudio();\n    if (!a) return;\n    this.syncCap = [];\n    a.currentTime = 0;\n    a.play().catch(() => {});\n    this.setState({ menuOpen: false, syncMode: true, syncIdx: 0, lyricsOpen: true, playing: true, elapsed: 0 });\n  };\n  onTapSync = () => {\n    const a = this.audio;\n    if (!a) return;\n    const i = this.state.syncIdx;\n    this.syncCap[i] = i === 0 ? 0 : a.currentTime;\n    const next = i + 1;\n    if (next >= this.lines.length) {\n      this.times = this.syncCap.slice();\n      this.saveTimes(this.times);\n      a.pause();\n      this.setState({ syncMode: false, playing: false });\n    } else {\n      this.setState({ syncIdx: next });\n    }\n  };\n  onCancelSync = () => {\n    if (this.audio) this.audio.pause();\n    this.setState({ syncMode: false, playing: false });\n  };\n\n  onLike = () => this.setState(s => ({ liked: !s.liked, burstId: s.liked ? s.burstId : s.burstId + 1 }));\n  onLyrics = () => this.setState(s => ({ lyricsOpen: !s.lyricsOpen }));\n  onShuffle = () => this.setState(s => ({ shuffleOn: !s.shuffleOn }));\n  onRepeat = () => this.setState(s => ({ repeatOn: !s.repeatOn }));\n\n  fmt(sec) {\n    const m = Math.floor(sec / 60);\n    const s = Math.floor(sec % 60);\n    return m + \":\" + (s < 10 ? \"0\" + s : s);\n  }\n\n  renderVals() {\n    const { playing, elapsed, liked, lyricsOpen, collapsed } = this.state;\n    const isMobile = (typeof window !== \"undefined\") && window.innerWidth <= 700;\n    const expanded = this.state.expanded;\n    const wide = expanded && !isMobile;  // desktop spread content (insets + 16:9)\n    const full = expanded;               // fills the whole screen on any device\n    const N = this.lines.length;\n    const times = this.times || this.defaultTimes;\n    const sec = elapsed / 1000;\n    let active = 0;\n    for (let i = 0; i < N; i++) { if (sec >= times[i] - 0.001) active = i; else break; }\n    if (this.state.syncMode) active = Math.min(this.state.syncIdx, N - 1);\n    const revealed = lyricsOpen;\n    const progress = Math.min(elapsed / this.total, 1);\n\n    const lineH = wide ? 62 : 54;\n    const stageH = (this.stageRef.current && this.stageRef.current.offsetHeight) || 340;\n    const center = stageH / 2 - lineH / 2;\n\n    const lines = this.lines.map((text, i) => {\n      const isActive = revealed && i === active;\n      const isPast = revealed && i < active;\n      const color = isActive ? \"#fff6ec\" : isPast ? \"rgba(255,243,228,0.62)\" : \"rgba(255,243,228,0.38)\";\n      const style = [\n        \"height:\" + lineH + \"px\",\n        \"display:flex\",\n        \"align-items:center\",\n        \"font-size:\" + (wide ? (isActive ? 34 : 29) : (isActive ? 25 : 22)) + \"px\",\n        \"font-weight:\" + (isActive ? 800 : 700),\n        \"letter-spacing:-0.01em\",\n        \"line-height:1.15\",\n        \"color:\" + color,\n        \"transform:\" + (isActive ? \"scale(1.02)\" : \"scale(1)\"),\n        \"transform-origin:left center\",\n        \"cursor:\" + (revealed ? \"pointer\" : \"default\"),\n        \"pointer-events:\" + (revealed ? \"auto\" : \"none\"),\n        \"transition:color .4s ease, transform .4s ease, font-size .3s ease\",\n      ].join(\";\");\n      return { text, style, onSeek: () => { const t = (this.times || this.defaultTimes)[i] || 0; if (this.audio) this.audio.currentTime = t; this.setState({ elapsed: t * 1000 }); } };\n    });\n\n    const burstId = this.state.burstId;\n    let heartBurst = null;\n    if (burstId > 0) {\n      const specs = [\n        { dx: -34, dy: -78, s: 15, rot: -28, d: 0 },\n        { dx: -14, dy: -96, s: 20, rot: -10, d: 0.06 },\n        { dx: 8,   dy: -104, s: 17, rot: 12,  d: 0.02 },\n        { dx: 30,  dy: -84, s: 14, rot: 26,  d: 0.1 },\n        { dx: -2,  dy: -70, s: 12, rot: 4,   d: 0.14 },\n      ];\n      heartBurst = React.createElement(\n        \"div\",\n        { key: burstId, style: { position: \"absolute\", left: 0, top: 0 } },\n        specs.map((p, i) =>\n          React.createElement(\n            \"span\",\n            {\n              key: i,\n              style: {\n                position: \"absolute\",\n                left: 0,\n                top: 0,\n                fontSize: p.s + \"px\",\n                color: \"#1ed760\",\n                \"--dx\": p.dx + \"px\",\n                \"--dy\": p.dy + \"px\",\n                \"--rot\": p.rot + \"deg\",\n                animation: \"heartBurst 1s ease-out \" + p.d + \"s forwards\",\n              },\n            },\n            \"♥\"\n          )\n        )\n      );\n    }\n\n    return {\n      heartBurst,\n      trackRef: this.trackRef,\n      onScrubDown: this.onScrubDown,\n      onScrubMove: this.onScrubMove,\n      onScrubUp: this.onScrubUp,\n      onShuffle: this.onShuffle,\n      onRepeat: this.onRepeat,\n      onMenu: this.onMenu,\n      menuOpen: this.state.menuOpen,\n      onStartSync: this.onStartSync,\n      onTapSync: this.onTapSync,\n      onCancelSync: this.onCancelSync,\n      syncMode: this.state.syncMode,\n      syncProgress: Math.min(this.state.syncIdx + 1, N) + \" / \" + N,\n      onExpand: this.onExpand,\n      onCollapse: this.onCollapse,\n      expanded,\n      notExpanded: !expanded,\n      notCollapsed: !collapsed,\n      collapsed,\n      chevronRotate: collapsed ? \"rotate(180deg)\" : \"rotate(0deg)\",\n      isMobile,\n      notMobile: !isMobile,\n      wrapperBg: full ? \"#121212\" : \"linear-gradient(180deg, #3a241a 0%, #1a120d 42%, #000 100%)\",\n      wrapperPad: full ? \"0\" : \"32px 20px\",\n      expandBtnOpacity: 1,\n      expandBtnEvents: \"auto\",\n      cardWidth: full ? \"100vw\" : \"420px\",\n      cardMaxWidth: full ? \"100vw\" : \"94vw\",\n      cardMinHeight: full ? \"100vh\" : \"0\",\n      cardRadius: full ? \"0px\" : \"14px\",\n      cardJustify: full ? \"center\" : \"flex-start\",\n      stageHeight: wide ? \"auto\" : \"340px\",\n      stageAspect: wide ? \"16 / 9\" : \"auto\",\n      stagePad: wide ? \"0 16%\" : \"0\",\n      controlsPad: wide ? \"0 16%\" : \"0 6px\",\n      bottomPad: wide ? \"0 16%\" : \"0 4px\",\n      metaPad: wide ? \"0 16%\" : \"0 2px\",\n      progressPad: wide ? \"0 16%\" : \"0 2px\",\n      expandColor: expanded ? \"#1ed760\" : \"#b3b3b3\",\n      shuffleColor: this.state.shuffleOn ? \"#fff\" : \"#1ed760\",\n      repeatColor: this.state.repeatOn ? \"#fff\" : \"#1ed760\",\n      trackFill: this.dragging ? \"#1ed760\" : \"#fff\",\n      knobScale: this.dragging ? 1.25 : 1,\n      lines,\n      playing,\n      paused: !playing,\n      liked,\n      notLiked: !liked,\n      onPlay: this.onPlay,\n      onLike: this.onLike,\n      onLyrics: this.onLyrics,\n      coverOpacity: revealed ? 0 : 1,\n      lyricsOpacity: revealed ? 1 : 0,\n      eqOpacity: playing ? 1 : 0,\n      listTransform: \"translateY(\" + (center - active * lineH) + \"px)\",\n      progressPct: (progress * 100).toFixed(2) + \"%\",\n      knobOpacity: (this.dragging || playing || elapsed > 0) ? 1 : 0,\n      curTime: this.fmt(elapsed / 1000),\n      durTime: this.fmt(this.total / 1000),\n      lyricsPillBg: revealed ? \"#1ed760\" : \"transparent\",\n      lyricsPillColor: revealed ? \"#000\" : \"#b3b3b3\",\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
