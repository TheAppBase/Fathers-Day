<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Happy Father's Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Figtree', sans-serif;
    background: linear-gradient(180deg, #3a241a 0%, #1a120d 42%, #000 100%);
    padding: 32px 20px;
    color: #fff;
    transition: background 0.45s ease, padding 0.45s ease;
  }
  body.full {
    background: #121212;
    padding: 0;
  }

  @keyframes eqbar { 0%,100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
  @keyframes heartBurst {
    0%   { opacity: 0; transform: translate(-50%, 0) scale(0.3) rotate(0deg); }
    18%  { opacity: 1; }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), var(--dy)) scale(1) rotate(var(--rot)); }
  }

  /* ---- card ---- */
  .card {
    width: 420px;
    max-width: 94vw;
    border-radius: 14px;
    background: linear-gradient(180deg, #232323 0%, #121212 60%);
    box-shadow: 0 40px 90px -30px rgba(0,0,0,0.8);
    padding: 18px 18px 20px;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    transition: width 0.45s cubic-bezier(0.22,1,0.36,1);
  }
  body.full .card {
    width: 100vw;
    max-width: 100vw;
    min-height: 100dvh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    overflow: hidden;
    border-radius: 0;
  }

  /* ---- header ---- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 4px 14px;
    transition: padding 0.4s ease;
  }
  body.wide .header { padding: 4px 16% 14px; }
  .chevron { cursor: pointer; transition: transform 0.3s ease; }
  .header-label-top {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #b3b3b3; font-weight: 700;
  }
  .header-label-main { font-size: 13px; font-weight: 700; color: #fff; }
  .menu-wrap { position: relative; cursor: pointer; }
  .menu-dots { display: flex; gap: 3px; padding: 4px 0; }
  .menu-dots span { width: 4px; height: 4px; border-radius: 50%; background: #fff; }
  .menu-pop {
    position: absolute; right: 0; top: 26px; z-index: 60;
    background: #282828; border-radius: 8px;
    box-shadow: 0 12px 34px rgba(0,0,0,0.55);
    padding: 5px; min-width: 184px;
  }
  .menu-pop a {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 12px; border-radius: 5px;
    color: #fff; text-decoration: none; font-size: 14px; font-weight: 600;
  }
  .menu-pop a:hover { background: #3e3e3e; }

  /* ---- stage ---- */
  .stage-pad { padding: 0; transition: padding 0.4s ease; }
  body.wide .stage-pad { padding: 0 16%; }
  .stage {
    position: relative; width: 100%; height: 340px;
    border-radius: 10px; overflow: hidden;
  }
  body.wide .stage { height: auto; max-height: 46vh; aspect-ratio: 16 / 9; }

  .cover {
    position: absolute; inset: 0; pointer-events: none;
    transition: opacity 0.6s ease;
    background: linear-gradient(145deg, #cf7b43 0%, #a8542b 48%, #6f3417 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .cover-grain {
    position: absolute; inset: 0; opacity: 0.5;
    background-image: radial-gradient(rgba(0,0,0,0.18) 1px, transparent 1px);
    background-size: 14px 14px;
  }
  .cover-sun {
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(circle at 38% 34%, #f7dca6, #e3a857 72%);
    box-shadow: 0 0 50px rgba(247,220,166,0.45);
  }
  .cover-title {
    margin-top: 28px; font-size: 13px; letter-spacing: 0.3em;
    text-transform: uppercase; color: rgba(255,243,228,0.85);
    font-weight: 700; text-align: center; line-height: 1.5;
  }

  .lyrics {
    position: absolute; inset: 0; opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
    background: linear-gradient(165deg, #b85c38 0%, #8f4321 100%);
    overflow: hidden;
  }
  .lyrics-list {
    position: absolute; left: 0; right: 0; padding: 0 30px;
    transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
  }
  .lyric-line {
    display: flex; align-items: center;
    letter-spacing: -0.01em; line-height: 1.15;
    transform-origin: left center;
    transition: color .4s ease, transform .4s ease, font-size .3s ease;
  }
  .eq {
    position: absolute; left: 14px; top: 12px;
    display: flex; gap: 3px; align-items: flex-end; height: 16px;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .eq span {
    width: 3px; height: 16px; background: #fff; border-radius: 2px;
    transform-origin: bottom; animation: eqbar 0.9s ease-in-out infinite;
  }
  .eq span:nth-child(2) { animation-delay: 0.3s; }
  .eq span:nth-child(3) { animation-delay: 0.15s; }

  /* ---- meta ---- */
  .meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px; padding: 0 2px;
  }
  body.wide .meta { padding: 0 16%; }
  .meta-title {
    font-size: 22px; font-weight: 800; letter-spacing: -0.01em; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .meta-sub { font-size: 14px; color: #b3b3b3; font-weight: 500; margin-top: 2px; }
  .like { cursor: pointer; flex: none; margin-left: 14px; position: relative; }
  .like-burst { position: absolute; left: 50%; top: 0; width: 0; height: 0; pointer-events: none; }
  .burst-heart { position: absolute; left: 0; top: 0; color: #1ed760; }

  /* ---- progress ---- */
  .progress { margin-top: 18px; padding: 0 2px; }
  body.wide .progress { padding: 0 16%; }
  .track {
    height: 16px; display: flex; align-items: center; position: relative;
    cursor: pointer; touch-action: none;
  }
  .track-bg { height: 4px; width: 100%; border-radius: 2px; background: #4d4d4d; position: relative; }
  .track-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: #fff; border-radius: 2px; }
  .track-knob {
    position: absolute; top: 50%; left: 0; width: 13px; height: 13px; border-radius: 50%;
    background: #fff; transform: translate(-50%, -50%) scale(1); opacity: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4); transition: transform 0.12s ease;
  }
  .times {
    display: flex; justify-content: space-between; margin-top: 7px;
    font-size: 11px; color: #b3b3b3; font-weight: 500;
  }

  /* ---- controls ---- */
  .controls {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px; padding: 0 6px; transition: padding 0.4s ease;
  }
  body.wide .controls { padding: 0 16%; }
  .controls .icon-btn { cursor: pointer; }
  .play-btn {
    cursor: pointer; width: 64px; height: 64px; border-radius: 50%;
    background: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px -6px rgba(0,0,0,0.5);
  }

  /* ---- bottom bar ---- */
  .bottom {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 22px; padding: 0 4px;
  }
  body.wide .bottom { padding: 0 16%; }
  .expand-btn { cursor: pointer; display: flex; }
  .lyrics-pill {
    cursor: pointer; display: flex; align-items: center; gap: 7px;
    background: transparent; color: #b3b3b3;
    font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
    padding: 7px 16px; border-radius: 20px; transition: all 0.3s ease;
  }

  /* collapse hides stage + bottom bar */
  body.collapsed .stage-pad,
  body.collapsed .bottom { display: none; }

  /* ---- sync overlay ---- */
  .sync {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 90;
    display: none; flex-direction: column; align-items: center; gap: 14px;
    padding: 26px 20px 30px;
    background: linear-gradient(180deg, rgba(18,18,18,0), #000 55%);
    font-family: 'Figtree', sans-serif;
  }
  body.sync .sync { display: flex; }
  .sync-hint { color: #b3b3b3; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; text-align: center; }
  .sync-tap {
    cursor: pointer; width: 220px; height: 66px; border-radius: 33px;
    background: #1ed760; color: #000; font-size: 19px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 32px -8px rgba(30,215,96,0.6); user-select: none;
  }
  .sync-cancel { cursor: pointer; color: #b3b3b3; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>

  <div class="card" id="card">

    <!-- header -->
    <div class="header">
      <svg class="chevron" id="chevron" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"></path></svg>
      <div style="text-align: center; line-height: 1.3;">
        <div class="header-label-top">Playing from</div>
        <div class="header-label-main">Father's Day 2026</div>
      </div>
      <div class="menu-wrap" id="menuWrap">
        <div class="menu-dots"><span></span><span></span><span></span></div>
        <div class="menu-pop" id="menuPop" style="display: none;">
          <a href="https://open.spotify.com/playlist/4nemEKPngcjL2399cAaCtN?si=E5l6PR2iSsWNFhGZ2T-J0w&pt=0d6899c8906cdd04eb95318d2e894865" target="_blank" rel="noopener">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="#1ed760"><path d="M3 5h18v2H3zM3 11h18v2H3zM3 17h10v2H3z"></path><path d="M16 16l5 3-5 3z"></path></svg>
            View playlist
          </a>
        </div>
      </div>
    </div>

    <!-- STAGE: album cover <-> lyrics -->
    <div class="stage-pad">
      <div class="stage" id="stage">
        <!-- album cover -->
        <div class="cover" id="cover">
          <div class="cover-grain"></div>
          <div class="cover-sun"></div>
          <div class="cover-title">Happy Fat her's Day</div>
        </div>
        <!-- lyrics view -->
        <div class="lyrics" id="lyricsView">
          <div class="lyrics-list" id="lyricsList"></div>
          <div class="eq" id="eq"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

    <!-- meta row -->
    <div class="meta">
      <div style="min-width: 0;">
        <div class="meta-title">Happy Father's Day</div>
        <div class="meta-sub">Jackson</div>
      </div>
      <div class="like" id="like">
        <div class="like-burst" id="likeBurst"></div>
        <span id="likeIcon"></span>
      </div>
    </div>

    <!-- progress -->
    <div class="progress">
      <div class="track" id="track">
        <div class="track-bg">
          <div class="track-fill" id="trackFill"></div>
          <div class="track-knob" id="trackKnob"></div>
        </div>
      </div>
      <div class="times">
        <span id="curTime">0:00</span>
        <span id="durTime">0:10</span>
      </div>
    </div>

    <!-- controls -->
    <div class="controls">
      <svg id="shuffle" class="icon-btn" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1ed760" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h4v4M4 20l16-16M16 20h4v-4M14.5 14.5L20 20M4 4l5 5"></path></svg>
      <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><path d="M7 6h2v12H7zM20 6v12l-9-6z"></path></svg>
      <div class="play-btn" id="play"></div>
      <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><path d="M15 6h2v12h-2zM4 6l9 6-9 6z"></path></svg>
      <svg id="repeat" class="icon-btn" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1ed760" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 22l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
    </div>

    <!-- bottom bar -->
    <div class="bottom">
      <div class="expand-btn" id="expand"></div>
      <div class="lyrics-pill" id="lyricsPill">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M4 5h16v2H4zM4 11h16v2H4zM4 17h10v2H4z"></path></svg>
        Lyrics
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b3b3b3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"></path><path d="M12 3v13M8 7l4-4 4 4"></path></svg>
    </div>
  </div>

  <!-- sync overlay -->
  <div class="sync" id="sync">
    <div class="sync-hint">Tap right as each line begins · <span id="syncProgress">1 / 9</span></div>
    <div class="sync-tap" id="syncTap">Tap</div>
    <div class="sync-cancel" id="syncCancel">Cancel</div>
  </div>

<script>
(function () {
  "use strict";

  // ---- SVG icon markup (state-dependent) ----
  var ICONS = {
    play:  '<svg width="26" height="26" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"></path></svg>',
    pause: '<svg width="26" height="26" viewBox="0 0 24 24" fill="#000"><path d="M7 5h3.2v14H7zM13.8 5H17v14h-3.2z"></path></svg>',
    liked:   '<svg width="26" height="26" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#1ed760"></circle><path d="M7 12.5l3 3 6.5-7" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>',
    notLiked:'<svg width="26" height="26" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="none" stroke="#b3b3b3" stroke-width="1.8"></circle><path d="M12 7.5v9M7.5 12h9" stroke="#b3b3b3" stroke-width="1.8" stroke-linecap="round"></path></svg>',
    expanded:   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1ed760" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5"></path></svg>',
    notExpanded:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b3b3b3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"></path></svg>'
  };

  // ---- content ----
  var LINES = [
    "Hi Dad,",
    "I love you so much.",
    "You're the best dad ever.",
    "I loved when you laid next to me",
    "for almost two hours",
    "when I couldn't fall asleep.",
    "I hope you have a",
    "great Father's Day.",
    "Love, Jackson"
  ];
  var DEFAULT_TIMES = [0.3, 0.78, 1.99, 3.2, 5.14, 6.35, 7.8, 9.01, 9.98];

  // ---- state ----
  var state = {
    playing: false, elapsed: 0, liked: false, lyricsOpen: false,
    shuffleOn: false, repeatOn: false, collapsed: false, expanded: false,
    menuOpen: false, dur: 10800, syncMode: false, syncIdx: 0
  };
  var times = loadTimes();
  var dragging = false;
  var audio = null;
  var pendingPlay = false;
  var raf = null;
  var syncCap = [];

  // ---- element refs ----
  var $ = function (id) { return document.getElementById(id); };
  var el = {
    body: document.body, card: $("card"),
    chevron: $("chevron"), menuWrap: $("menuWrap"), menuPop: $("menuPop"),
    stage: $("stage"), cover: $("cover"), lyricsView: $("lyricsView"),
    lyricsList: $("lyricsList"), eq: $("eq"),
    like: $("like"), likeBurst: $("likeBurst"), likeIcon: $("likeIcon"),
    track: $("track"), trackFill: $("trackFill"), trackKnob: $("trackKnob"),
    curTime: $("curTime"), durTime: $("durTime"),
    shuffle: $("shuffle"), repeat: $("repeat"),
    play: $("play"),
    expand: $("expand"), lyricsPill: $("lyricsPill"),
    sync: $("sync"), syncProgress: $("syncProgress"),
    syncTap: $("syncTap"), syncCancel: $("syncCancel")
  };

  // ---- build lyric lines once ----
  var lineEls = LINES.map(function (text, i) {
    var d = document.createElement("div");
    d.className = "lyric-line";
    d.textContent = text;
    d.addEventListener("click", function () {
      var t = (times || DEFAULT_TIMES)[i] || 0;
      if (audio) audio.currentTime = t;
      state.elapsed = t * 1000;
      render();
    });
    el.lyricsList.appendChild(d);
    return d;
  });

  // ---- persistence ----
  function loadTimes() {
    try {
      var raw = localStorage.getItem("fdc_times");
      if (raw) {
        var a = JSON.parse(raw);
        if (Array.isArray(a) && a.length === LINES.length) return a;
      }
    } catch (e) {}
    return DEFAULT_TIMES.slice();
  }
  function saveTimes(a) {
    try { localStorage.setItem("fdc_times", JSON.stringify(a)); } catch (e) {}
  }

  function total() { return state.dur || 10800; }

  // ---- audio ----
  function getAudio() {
    if (!audio) {
      var a = new Audio();
      a.preload = "auto";
      audio = a;
      a.addEventListener("error", function () { console.warn("audio error", a.error && a.error.code); });
      a.addEventListener("loadedmetadata", function () {
        if (a.duration && isFinite(a.duration)) { state.dur = a.duration * 1000; render(); }
      });
      a.addEventListener("ended", function () { stopTick(); state.playing = false; render(); });
      // Server mislabels song.wav's content-type, so load the bytes and re-wrap
      // them in a correctly-typed Blob the browser will actually decode.
      fetch("song.wav")
        .then(function (r) { return r.arrayBuffer(); })
        .then(function (b) {
          a.src = URL.createObjectURL(new Blob([b], { type: "audio/wav" }));
          if (pendingPlay) { pendingPlay = false; a.play().catch(function () {}); startTick(); }
        })
        .catch(function () { a.src = "song.wav"; });
    }
    return audio;
  }

  function startTick() {
    stopTick();
    var loop = function () {
      if (audio && !dragging) { state.elapsed = audio.currentTime * 1000; render(); }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
  }
  function stopTick() {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
  }

  // ---- scrubbing ----
  function clientXOf(e) {
    if (e.touches && e.touches[0]) return e.touches[0].clientX;
    if (e.changedTouches && e.changedTouches[0]) return e.changedTouches[0].clientX;
    return e.clientX;
  }
  function seekFromX(x) {
    var rect = el.track.getBoundingClientRect();
    var ratio = (x - rect.left) / rect.width;
    ratio = Math.max(0, Math.min(1, ratio));
    var ms = ratio * total();
    if (audio) audio.currentTime = ms / 1000;
    state.elapsed = ms;
    render();
  }
  function onScrubStart(e) {
    if (e.cancelable) e.preventDefault();
    dragging = true;
    seekFromX(clientXOf(e));
    var move = function (ev) {
      if (!dragging) return;
      if (ev.cancelable) ev.preventDefault();
      seekFromX(clientXOf(ev));
    };
    var end = function () {
      dragging = false;
      window.removeEventListener("mousemove", move);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("mouseup", end);
      window.removeEventListener("touchend", end);
      render();
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("touchmove", move, { passive: false });
    window.addEventListener("mouseup", end);
    window.addEventListener("touchend", end);
    render();
  }

  // ---- handlers ----
  function onPlay() {
    var a = getAudio();
    if (!a) return;
    if (state.playing) {
      a.pause();
      stopTick();
      state.playing = false;
      render();
    } else {
      if (!a.src) { pendingPlay = true; state.playing = true; render(); return; }
      if (a.currentTime >= (a.duration || 0) - 0.05) a.currentTime = 0;
      a.play().catch(function () {});
      startTick();
      state.playing = true;
      render();
    }
  }

  function onLike() {
    var wasLiked = state.liked;
    state.liked = !state.liked;
    if (!wasLiked) spawnBurst();
    render();
  }
  function spawnBurst() {
    var specs = [
      { dx: -34, dy: -78, s: 15, rot: -28, d: 0 },
      { dx: -14, dy: -96, s: 20, rot: -10, d: 0.06 },
      { dx: 8,   dy: -104, s: 17, rot: 12,  d: 0.02 },
      { dx: 30,  dy: -84, s: 14, rot: 26,  d: 0.1 },
      { dx: -2,  dy: -70, s: 12, rot: 4,   d: 0.14 }
    ];
    var wrap = document.createElement("div");
    wrap.style.cssText = "position:absolute;left:0;top:0;";
    specs.forEach(function (p) {
      var s = document.createElement("span");
      s.className = "burst-heart";
      s.textContent = "♥";
      s.style.fontSize = p.s + "px";
      s.style.setProperty("--dx", p.dx + "px");
      s.style.setProperty("--dy", p.dy + "px");
      s.style.setProperty("--rot", p.rot + "deg");
      s.style.animation = "heartBurst 1s ease-out " + p.d + "s forwards";
      wrap.appendChild(s);
    });
    el.likeBurst.appendChild(wrap);
    setTimeout(function () { if (wrap.parentNode) wrap.parentNode.removeChild(wrap); }, 1300);
  }

  function onMenu(e) {
    e.stopPropagation();
    state.menuOpen = !state.menuOpen;
    render();
  }
  function onExpand() { state.expanded = !state.expanded; render(); }
  function onCollapse() { state.collapsed = !state.collapsed; render(); }
  function onLyrics() { state.lyricsOpen = !state.lyricsOpen; render(); }
  function onShuffle() { state.shuffleOn = !state.shuffleOn; render(); }
  function onRepeat() { state.repeatOn = !state.repeatOn; render(); }

  // ---- tap-to-sync (recapture lyric timings) ----
  function onStartSync() {
    var a = getAudio();
    if (!a) return;
    syncCap = [];
    a.currentTime = 0;
    a.play().catch(function () {});
    state.menuOpen = false; state.syncMode = true; state.syncIdx = 0;
    state.lyricsOpen = true; state.playing = true; state.elapsed = 0;
    startTick();
    render();
  }
  function onTapSync() {
    var a = audio;
    if (!a) return;
    var i = state.syncIdx;
    syncCap[i] = i === 0 ? 0 : a.currentTime;
    var next = i + 1;
    if (next >= LINES.length) {
      times = syncCap.slice();
      saveTimes(times);
      a.pause();
      state.syncMode = false; state.playing = false;
      stopTick();
    } else {
      state.syncIdx = next;
    }
    render();
  }
  function onCancelSync() {
    if (audio) audio.pause();
    state.syncMode = false; state.playing = false;
    stopTick();
    render();
  }

  function fmt(sec) {
    var m = Math.floor(sec / 60);
    var s = Math.floor(sec % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
  }

  // ---- render ----
  function render() {
    var isMobile = window.innerWidth <= 700;
    var expanded = state.expanded;
    var wide = expanded && !isMobile;   // desktop: insets + 16:9 stage
    var full = expanded;                // fills screen on any device
    var N = LINES.length;
    var t = times || DEFAULT_TIMES;
    var sec = state.elapsed / 1000;

    var active = 0;
    for (var i = 0; i < N; i++) { if (sec >= t[i] - 0.001) active = i; else break; }
    if (state.syncMode) active = Math.min(state.syncIdx, N - 1);

    var revealed = state.lyricsOpen;
    var progress = Math.min(state.elapsed / total(), 1);

    // body-level layout flags
    el.body.classList.toggle("full", full);
    el.body.classList.toggle("wide", wide);
    el.body.classList.toggle("collapsed", state.collapsed);
    el.body.classList.toggle("sync", state.syncMode);

    // header
    el.chevron.style.transform = state.collapsed ? "rotate(180deg)" : "rotate(0deg)";
    el.menuPop.style.display = state.menuOpen ? "block" : "none";

    // stage crossfade
    el.cover.style.opacity = revealed ? 0 : 1;
    el.lyricsView.style.opacity = revealed ? 1 : 0;
    el.eq.style.opacity = state.playing ? 1 : 0;

    // lyric lines
    var lineH = wide ? 62 : 54;
    var stageH = el.stage.offsetHeight || 340;
    var center = stageH / 2 - lineH / 2;
    for (var j = 0; j < lineEls.length; j++) {
      var d = lineEls[j];
      var isActive = revealed && j === active;
      var isPast = revealed && j < active;
      var color = isActive ? "#fff6ec" : isPast ? "rgba(255,243,228,0.62)" : "rgba(255,243,228,0.38)";
      d.style.height = lineH + "px";
      d.style.fontSize = (wide ? (isActive ? 34 : 29) : (isActive ? 25 : 22)) + "px";
      d.style.fontWeight = isActive ? 800 : 700;
      d.style.color = color;
      d.style.transform = isActive ? "scale(1.02)" : "scale(1)";
      d.style.cursor = revealed ? "pointer" : "default";
      d.style.pointerEvents = revealed ? "auto" : "none";
    }
    el.lyricsList.style.transform = "translateY(" + (center - active * lineH) + "px)";

    // like
    el.likeIcon.innerHTML = state.liked ? ICONS.liked : ICONS.notLiked;

    // progress
    var pct = (progress * 100).toFixed(2) + "%";
    el.trackFill.style.width = pct;
    el.trackFill.style.background = dragging ? "#1ed760" : "#fff";
    el.trackKnob.style.left = pct;
    el.trackKnob.style.transform = "translate(-50%, -50%) scale(" + (dragging ? 1.25 : 1) + ")";
    el.trackKnob.style.opacity = (dragging || state.playing || state.elapsed > 0) ? 1 : 0;
    el.curTime.textContent = fmt(state.elapsed / 1000);
    el.durTime.textContent = fmt(total() / 1000);

    // controls
    el.shuffle.setAttribute("stroke", state.shuffleOn ? "#fff" : "#1ed760");
    el.repeat.setAttribute("stroke", state.repeatOn ? "#fff" : "#1ed760");
    el.play.innerHTML = state.playing ? ICONS.pause : ICONS.play;

    // bottom bar
    el.expand.innerHTML = expanded ? ICONS.expanded : ICONS.notExpanded;
    el.lyricsPill.style.background = revealed ? "#1ed760" : "transparent";
    el.lyricsPill.style.color = revealed ? "#000" : "#b3b3b3";

    // sync
    el.syncProgress.textContent = Math.min(state.syncIdx + 1, N) + " / " + N;
  }

  // ---- wire events ----
  el.chevron.addEventListener("click", onCollapse);
  el.menuWrap.addEventListener("click", onMenu);
  el.like.addEventListener("click", onLike);
  el.track.addEventListener("mousedown", onScrubStart);
  el.track.addEventListener("touchstart", onScrubStart, { passive: false });
  el.shuffle.addEventListener("click", onShuffle);
  el.repeat.addEventListener("click", onRepeat);
  el.play.addEventListener("click", onPlay);
  el.expand.addEventListener("click", onExpand);
  el.lyricsPill.addEventListener("click", onLyrics);
  el.syncTap.addEventListener("click", onTapSync);
  el.syncCancel.addEventListener("click", onCancelSync);
  // close menu when clicking elsewhere
  document.addEventListener("click", function () {
    if (state.menuOpen) { state.menuOpen = false; render(); }
  });

  window.addEventListener("resize", render);

  // expose sync starter for power users (matches prototype's onStartSync)
  window.startLyricSync = onStartSync;

  // ---- init ----
  getAudio();
  render();
})();
</script>
</body>
</html>
